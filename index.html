<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mezcal Sacrificio</title>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0A0A0A; overflow: hidden; height: 100vh; }

/* Language toggle — bottom right */
.lang-pill {
  position: fixed; bottom: 24px; right: 24px; z-index: 99999;
  display: flex; align-items: center; gap: 6px;
  padding: 8px 16px;
  background: rgba(10,10,10,0.9);
  backdrop-filter: blur(16px);
  border: 1px solid rgba(201,168,76,0.25);
  border-radius: 40px;
  box-shadow: 0 4px 24px rgba(0,0,0,0.4);
  font-family: 'DM Sans', sans-serif;
}
.lang-btn {
  font: 600 11px/1 sans-serif;
  text-transform: uppercase; cursor: pointer;
  transition: color 0.2s; border: none; background: none;
  color: rgba(245,240,232,0.35); padding: 4px 6px;
}
.lang-btn.active { color: #C9A84C; }
.lang-btn:hover:not(.active) { color: rgba(245,240,232,0.6); }
.lang-divider { color: rgba(245,240,232,0.15); font: 400 11px/1 sans-serif; }

.frame-container {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
}
.frame-container iframe {
  width: 100%; height: 100%; border: none;
}
</style>
</head>
<body>

<div class="lang-pill">
  <button class="lang-btn active" id="lang-en" onclick="setLang('en')">EN</button>
  <span class="lang-divider">|</span>
  <button class="lang-btn" id="lang-es" onclick="setLang('es')">ES</button>
</div>

<div class="frame-container">
  <iframe id="frame" src="direction-b.html"></iframe>
</div>

<script>
let currentLang = 'en';

function setLang(lang) {
  currentLang = lang;
  localStorage.setItem('sacrificio-lang', lang);
  document.getElementById('lang-en').classList.toggle('active', lang === 'en');
  document.getElementById('lang-es').classList.toggle('active', lang === 'es');
  document.getElementById('frame').contentWindow.postMessage({type: 'setLang', lang: lang}, '*');
}

// Restore saved language
(function() {
  const saved = localStorage.getItem('sacrificio-lang');
  if (saved === 'es') window.addEventListener('load', () => setLang('es'));
})();

// Keyboard: L = language
document.addEventListener('keydown', (e) => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  if (e.key === 'l' || e.key === 'L') setLang(currentLang === 'en' ? 'es' : 'en');
});
</script>
</body>
</html>

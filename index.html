<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mezcal Sacrificio</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'DM Sans', sans-serif; background: #0A0A0A; overflow: hidden; height: 100vh; }

/* Floating toggle pill — bottom right */
.floating-toggles {
  position: fixed; bottom: 24px; right: 24px; z-index: 99999;
  display: flex; align-items: center; gap: 12px;
  padding: 10px 18px;
  background: rgba(10,10,10,0.9);
  backdrop-filter: blur(16px);
  border: 1px solid rgba(201,168,76,0.25);
  border-radius: 40px;
  box-shadow: 0 4px 24px rgba(0,0,0,0.4);
}

/* Theme toggle */
.theme-toggle {
  display: flex; align-items: center; gap: 8px;
}
.theme-btn {
  font: 600 11px/1 'DM Sans', sans-serif;
  letter-spacing: 0.06em; text-transform: uppercase;
  cursor: pointer; padding: 6px 12px; border-radius: 20px;
  transition: all 0.3s ease; border: none; background: none;
  color: rgba(245,240,232,0.4);
}
.theme-btn.active {
  background: rgba(245,240,232,0.15);
  color: #F5F0E8;
}
.theme-btn:hover:not(.active) { color: rgba(245,240,232,0.7); }

/* Divider */
.toggle-divider {
  width: 1px; height: 20px;
  background: rgba(245,240,232,0.15);
}

/* Language toggle */
.lang-toggle {
  display: flex; align-items: center; gap: 6px;
}
.lang-btn {
  font: 600 11px/1 'DM Sans', sans-serif;
  text-transform: uppercase; cursor: pointer;
  transition: color 0.2s; border: none; background: none;
  color: rgba(245,240,232,0.35); padding: 4px 6px;
}
.lang-btn.active { color: #C9A84C; }
.lang-btn:hover:not(.active) { color: rgba(245,240,232,0.6); }
.lang-divider {
  color: rgba(245,240,232,0.15);
  font: 400 11px/1 'DM Sans', sans-serif;
}

/* Iframe */
.frame-container {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
}
.frame-container iframe {
  width: 100%; height: 100%; border: none;
  transition: opacity 0.4s ease;
}
.frame-container iframe.hidden {
  position: absolute; opacity: 0; pointer-events: none;
}
</style>
</head>
<body>

<!-- Floating toggles — bottom right -->
<div class="floating-toggles">
  <div class="theme-toggle">
    <button class="theme-btn active" id="btn-a" onclick="switchTo('a')">Light</button>
    <button class="theme-btn" id="btn-b" onclick="switchTo('b')">Dark</button>
  </div>
  <div class="toggle-divider"></div>
  <div class="lang-toggle">
    <button class="lang-btn active" id="lang-en" onclick="setLang('en')">EN</button>
    <span class="lang-divider">|</span>
    <button class="lang-btn" id="lang-es" onclick="setLang('es')">ES</button>
  </div>
</div>

<div class="frame-container">
  <iframe id="frame-a" src="direction-a.html"></iframe>
  <iframe id="frame-b" src="direction-b.html" class="hidden"></iframe>
</div>

<script>
let current = 'a';
let currentLang = 'en';

function switchTo(version) {
  current = version;
  document.getElementById('frame-a').classList.toggle('hidden', version !== 'a');
  document.getElementById('frame-b').classList.toggle('hidden', version !== 'b');
  document.getElementById('btn-a').classList.toggle('active', version === 'a');
  document.getElementById('btn-b').classList.toggle('active', version === 'b');
}

function setLang(lang) {
  currentLang = lang;
  localStorage.setItem('sacrificio-lang', lang);
  document.getElementById('lang-en').classList.toggle('active', lang === 'en');
  document.getElementById('lang-es').classList.toggle('active', lang === 'es');
  document.getElementById('frame-a').contentWindow.postMessage({type: 'setLang', lang: lang}, '*');
  document.getElementById('frame-b').contentWindow.postMessage({type: 'setLang', lang: lang}, '*');
}

// Restore saved language
(function() {
  const saved = localStorage.getItem('sacrificio-lang');
  if (saved === 'es') window.addEventListener('load', () => setLang('es'));
})();

// Keyboard shortcuts: T = theme, L = language
document.addEventListener('keydown', (e) => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  if (e.key === 't' || e.key === 'T') switchTo(current === 'a' ? 'b' : 'a');
  if (e.key === 'l' || e.key === 'L') setLang(currentLang === 'en' ? 'es' : 'en');
});
</script>
</body>
</html>
